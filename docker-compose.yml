services:
  redis:
    image: redis:7.2-alpine
    container_name: rhombus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: rhombus_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rhombus
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rhombus"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile.web   # slim image, no Spark
    image: rhombus_web
    container_name: rhombus_web
    command: sh -c "uv sync --no-dev --no-install-project && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CACHE_URL=redis://redis:6379/2
      - DB_NAME=rhombus
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - GEMINI_API_KEY=${GEMINI_API_KEY:-mock_key}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rhombus_celery
    container_name: rhombus_celery
    command: sh -c "uv sync --no-dev --no-install-project && celery -A core worker --loglevel=info"
    volumes:
      - ./backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CACHE_URL=redis://redis:6379/2
      - DB_NAME=rhombus
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - SPARK_MASTER=local[*]
      - GEMINI_API_KEY=${GEMINI_API_KEY:-mock_key}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: